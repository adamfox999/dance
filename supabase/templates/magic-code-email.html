<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your My Dances Temporary Login Code</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f7ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1f2937;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#f4f7ff;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:560px;background:#ffffff;border-radius:18px;overflow:hidden;border:1px solid #e5e7eb;box-shadow:0 10px 30px rgba(99,102,241,0.12);">
            <tr>
              <td style="background:linear-gradient(135deg,#7c3aed 0%,#2563eb 100%);padding:22px 24px;text-align:center;">
                <p style="margin:0;font-size:13px;letter-spacing:1.2px;color:#dbeafe;text-transform:uppercase;font-weight:700;">My Dances</p>
                <h1 style="margin:10px 0 0 0;font-size:28px;line-height:1.2;color:#ffffff;">✨ Temporary Login Code ✨</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 24px 24px 24px;">
                <p style="margin:0 0 12px 0;font-size:16px;line-height:1.6;">Your stage is ready. Enter this temporary code to log in:</p>

                <div style="margin:18px 0 20px 0;padding:16px 14px;border:2px dashed #c4b5fd;background:#f5f3ff;border-radius:12px;text-align:center;">
                  <span style="display:inline-block;font-size:34px;line-height:1.1;letter-spacing:8px;font-weight:800;color:#5b21b6;">{{ .Token }}</span>
                </div>

                <p style="margin:0 0 8px 0;font-size:14px;line-height:1.6;color:#4b5563;">⏱️ This temporary login code expires soon, so use it while it’s fresh.</p>
                <p style="margin:0;font-size:14px;line-height:1.6;color:#4b5563;">If you didn’t request this login, you can safely ignore this email.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 24px 24px 24px;text-align:center;background:#fafaff;border-top:1px solid #eef2ff;">
                <p style="margin:0;font-size:12px;color:#6b7280;">Keep dancing,<br /><strong style="color:#4338ca;">The My Dances Team</strong></p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
