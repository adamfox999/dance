<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Confirm It’s You — My Dances</title>
  </head>
  <body style="margin:0;padding:0;background:#fdf4ff;font-family:'Fredoka',ui-rounded,'Nunito',system-ui,sans-serif;color:#262626;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#fdf4ff;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:440px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(168,85,247,0.18);">

            <!-- Header -->
            <tr>
              <td style="text-align:center;padding:32px 28px 20px 28px;">
                <div style="font-size:3rem;line-height:1;">🔐</div>
                <h1 style="margin:10px 0 4px 0;font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Confirm It’s You</h1>
                <p style="margin:0;font-size:0.88rem;color:#737373;">Parent re-authentication for My Dances</p>
              </td>
            </tr>

            <!-- Code body -->
            <tr>
              <td style="padding:0 28px 28px 28px;">
                <p style="margin:0 0 16px 0;font-size:0.95rem;line-height:1.6;color:#525252;">Enter this temporary 6-digit code to unlock parent mode:</p>

                <div style="margin:0 0 18px 0;padding:14px;background:#fdf4ff;border:2px solid #f5d0fe;border-radius:10px;text-align:center;">
                  <span style="display:inline-block;font-size:2rem;line-height:1.2;letter-spacing:8px;font-weight:700;color:#9333ea;">{{ .Token }}</span>
                </div>

                <p style="margin:0 0 6px 0;font-size:0.85rem;line-height:1.5;color:#737373;">This code expires shortly — enter it in the app to continue.</p>
                <p style="margin:0;font-size:0.85rem;line-height:1.5;color:#737373;">If you didn’t request this, you can safely ignore this email.</p>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding:14px 28px;text-align:center;background:#fdf4ff;border-top:1px solid #fae8ff;">
                <p style="margin:0;font-size:0.78rem;color:#a3a3a3;">Keep dancing 💜</p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
